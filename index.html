    // ========== УНИВЕРСАЛЬНЫЕ ФУНКЦИИ ==========

    let isServerAvailable = false;

    async function checkServer() {
        try {
            const response = await fetch(`${API_URL}?action=get_employees`);
            if (response.ok) {
                isServerAvailable = true;
                return true;
            }
        } catch (e) {}
        return false;
    }

    async function getEmployees() {
        try {
            const response = await fetch(`${API_URL}?action=get_employees`);
            if (response.ok) {
                const data = await response.json();
                if (data && data.length > 0) {
                    isServerAvailable = true;
                    return data;
                }
            }
        } catch (e) {
            isServerAvailable = false;
        }
        const data = localStorage.getItem(STORAGE.employees);
        return data ? JSON.parse(data) : [];
    }

    async function loginUser(login, password) {
        try {
            const response = await fetch(`${API_URL}?action=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`);
            if (response.ok) {
                const result = await response.json();
                if (result.success) {
                    isServerAvailable = true;
                    return result;
                }
            }
        } catch (e) {
            isServerAvailable = false;
        }
        const users = JSON.parse(localStorage.getItem(STORAGE.users)) || [];
        const user = users.find(u => u.login === login && u.password === password);
        if (user) {
            const employees = JSON.parse(localStorage.getItem(STORAGE.employees)) || [];
            const emp = employees.find(e => e.id === user.employeeId);
            return {
                success: true,
                user: emp ? { ...emp, login: user.login, role: user.role } : { ...user, position: 'Администратор системы' }
            };
        }
        return { success: false, error: 'Неверный логин или пароль' };
    }

    async function addPoints(employeeId, achievementName, points, month) {
        if (isServerAvailable) {
            try {
                const response = await fetch(`${API_URL}?action=add_points`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId, achievementName, points, month })
                });
                if (response.ok) return await response.json();
            } catch (e) {}
        }
        const records = JSON.parse(localStorage.getItem(STORAGE.pointsRecords)) || [];
        records.push({ id: Date.now(), employeeId, achievementName, points, month });
        localStorage.setItem(STORAGE.pointsRecords, JSON.stringify(records));
        return { success: true };
    }

                    body: JSON.stringify({ employeeId, amount, month, reason })
                });
                if (response.ok) return await response.json();
            } catch (e) {}
        }
        const bonuses = JSON.parse(localStorage.getItem(STORAGE.cashBonuses)) || [];
        bonuses.push({ id: Date.now(), employeeId, amount, month, reason });
        localStorage.setItem(STORAGE.cashBonuses, JSON.stringify(bonuses));
        return { success: true };
    }

    async function updateRate(employeeId, newRate) {
        if (isServerAvailable) {
            try {
                const response = await fetch(`${API_URL}?action=update_rate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId, newRate })
                });
                if (response.ok) return await response.json();
            } catch (e) {}
        }
        const employees = JSON.parse(localStorage.getItem(STORAGE.employees)) || [];
        const emp = employees.find(e => e.id === employeeId);
        if (emp) {
            emp.baseRate = newRate;
            localStorage.setItem(STORAGE.employees, JSON.stringify(employees));
            return { success: true };
        }
        return { success: false, error: 'Сотрудник не найден' };
    }

    async function clearPointsByEmployeeAndMonth(employeeId, month) {
        if (isServerAvailable) {
            try {
                const response = await fetch(`${API_URL}?action=clear_points_by_employee_month`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId, month })
                });
                if (response.ok) return { success: true };
            } catch (e) {}
        }
        let records = JSON.parse(localStorage.getItem(STORAGE.pointsRecords)) || [];
        records = records.filter(r => !(r.employeeId === employeeId && r.month === month));
        localStorage.setItem(STORAGE.pointsRecords, JSON.stringify(records));
        return { success: true };
    }

    async function clearAllPointsByEmployee(employeeId) {
        if (isServerAvailable) {
            try {
                const response = await fetch(`${API_URL}?action=clear_all_points_by_employee`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId })
                });
                if (response.ok) return { success: true };
            } catch (e) {}
        }
        let records = JSON.parse(localStorage.getItem(STORAGE.pointsRecords)) || [];
        records = records.filter(r => r.employeeId !== employeeId);
        localStorage.setItem(STORAGE.pointsRecords, JSON.stringify(records));
        return { success: true };
    }

    function getPoints(employeeId, month) {
        const records = JSON.parse(localStorage.getItem(STORAGE.pointsRecords)) || [];
        return records.filter(r => r.employeeId === employeeId && r.month === month).reduce((s, r) => s + r.points, 0);
    }

    function getBonuses(employeeId, month) {
        const bonuses = JSON.parse(localStorage.getItem(STORAGE.cashBonuses)) || [];
        return bonuses.filter(b => b.employeeId === employeeId && b.month === month).reduce((s, b) => s + b.amount, 0);
    }

    function renderApp() {
        const appDiv = document.getElementById('app');
        if (!currentUser) {
            appDiv.innerHTML = renderLoginScreen();
            document.getElementById('login-form')?.addEventListener('submit', handleLogin);
            return;
        }
        if (currentUser.position === 'Администратор системы' || currentUser.role === 'admin') {
            renderAdminDashboard().then(html => { appDiv.innerHTML = html; attachAdminEvents(); });
        } else {
            appDiv.innerHTML = renderUserDashboard();
            attachUserEvents();
        }
    }

                        <button type="submit" style="width:100%;">Войти</button>
                    </form>
                </div>
            </div>
        `;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const login = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!login || !password) { alert('Заполните все поля'); return; }
        const result = await loginUser(login, password);
        if (result.success) {
            currentUser = result.user;
            saveCurrentUser(currentUser);
            renderApp();
        } else {
            alert('Неверный логин или пароль');
        }
    }

    // ========== АДМИН-ПАНЕЛЬ ==========

    async function renderAdminDashboard() {
        const employees = await getEmployees();
        const currentMonth = new Date().toISOString().slice(0, 7);

        return `
            <div class="container">
                <div class="card">
                    <div class="user-header"><h1>🎓 ГГУ - Панель деканата</h1><button id="logout-btn" class="btn-secondary">Выйти</button></div>
                    <p>👋 Вы вошли как <strong>${currentUser.position}</strong></p>
                    <p>⭐ Стоимость 1 балла: <strong>${POINT_VALUE} ₽</strong></p>
                </div>

                <div class="card">
                    <h2>👥 Штат сотрудников (${employees.length} чел.)</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Должность</th><th>Базовая ставка</th><th>Баллов за месяц</th><th>Премия от баллов</th><th>Действия</th></tr></thead>
                            <tbody>
                                ${employees.map(emp => {
                                    const points = getPoints(emp.id, currentMonth);
                                    const pointsBonus = points * POINT_VALUE;
                                    return `
                                        <tr>
                                            <td>${emp.position}</td>
                                            <td>${Number(emp.baseRate).toLocaleString()} ₽</td>
                                            <td><span class="points-badge">${points} баллов</span></td>
                                            <td>${pointsBonus.toLocaleString()} ₽</td>
                                            <td><button class="edit-rate-btn" data-id="${emp.id}">✏️ Изменить ставку</button></td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="grid-2col">
                    <div class="card">
                        <h3>📝 Начислить баллы</h3>
                        <div class="form-group"><label>Сотрудник</label>
                            <select id="points-emp">${employees.map(emp => `<option value="${emp.id}">${emp.position}</option>`).join('')}</select>
                        </div>
                        <div class="form-group">
                            <label>Категория достижения</label>
                            <select id="achievement-category">
                                <option value="all">Все категории</option>
                                ${[...new Set(Object.values(ACHIEVEMENTS).map(a => a.category))].map(cat =>
                                    `<option value="${cat}">${cat}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Тип достижения</label>
                            <select id="achievement-type">
                                ${Object.entries(ACHIEVEMENTS).map(([key, val]) =>
                                    `<option value="${key}" data-category="${val.category}" data-points="${val.points}">${val.name} (${val.points} баллов)</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="form-group"><label>Месяц</label><input type="month" id="points-month" value="${currentMonth}"></div>
                        <button id="add-points-btn">➕ Начислить баллы</button>
                    </div>

                    <div class="card">
                        <h3>💰 Назначить премию</h3>
                        <div class="form-group"><label>Сотрудник</label>
                            <select id="cash-emp">${employees.map(emp => `<option value="${emp.id}">${emp.position}</option>`).join('')}</select>
                        </div>
                        <div class="form-group"><label>Сумма премии (₽)</label><input type="number" id="cash-amount" step="1000" value="5000"></div>
                        <div class="form-group"><label>Месяц</label><input type="month" id="cash-month" value="${currentMonth}"></div>
                        <div class="form-group"><label>Основание</label><input type="text" id="cash-reason" placeholder="Например: работа в приёмной комиссии"></div>
                        <button id="add-cash-btn">✨ Назначить премию</button>
                    </div>
                </div>

                <div class="card">
                    <h2>💰 Расчёт зарплаты за месяц</h2>
                    <div class="form-group"><label>Выберите месяц</label><input type="month" id="salary-month" value="${currentMonth}"></div>
                    <button id="calc-salary-btn">Рассчитать зарплату</button>
                    <div id="salary-result" style="margin-top:1rem;"></div>
                </div>

                <div class="card">
                    <h2>🧹 Очистка данных</h2>
                    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                        <button id="clear-points-btn" style="background:#dc2626;">🗑️ Очистить все баллы</button>
                        <button id="clear-bonuses-btn" style="background:#dc2626;">🗑️ Очистить все премии</button>
                        <button id="clear-all-btn" style="background:#b91c1c;">⚠️ Очистить всё</button>
                    </div>
                    <p style="margin-top:0.75rem; color:#7a6a5c; font-size:0.8rem;">⚠️ Внимание! Данные будут удалены без возможности восстановления.</p>
                </div>

                <div class="card">
                    <h2>🎯 Очистка баллов у конкретного сотрудника</h2>
                    <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
                        <div class="form-group" style="flex:2;">
                            <label>Выберите сотрудника</label>
                            <select id="clear-employee-select">
                                ${employees.map(emp => `<option value="${emp.id}">${emp.position}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Месяц</label>
                            <input type="month" id="clear-month" value="${currentMonth}">
                        </div>
                        <button id="clear-employee-month-btn" style="background:#f97316;">🗑️ Очистить баллы за месяц</button>
                        <button id="clear-employee-all-btn" style="background:#dc2626;">⚠️ Очистить ВСЕ баллы сотрудника</button>
                    </div>
                    <p style="margin-top:0.75rem; color:#7a6a5c; font-size:0.8rem;">⚠️ Удаляет баллы только у выбранного сотрудника.</p>
                </div>
            </div>
        `;
    }

    // ========== СОБЫТИЯ АДМИНА ==========

    function attachAdminEvents() {
        document.getElementById('logout-btn')?.addEventListener('click', () => { currentUser = null; clearCurrentUser(); renderApp(); });

        document.getElementById('achievement-category')?.addEventListener('change', function() {
            const category = this.value;
            const select = document.getElementById('achievement-type');
            select.innerHTML = '';
            for (const [key, val] of Object.entries(ACHIEVEMENTS)) {
                if (category === 'all' || val.category === category) {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = `${val.name} (${val.points} баллов)`;
                    opt.dataset.points = val.points;
                    select.appendChild(opt);
                }
            }
        });

        document.getElementById('add-points-btn')?.addEventListener('click', async () => {
            const employeeId = document.getElementById('points-emp').value;
            const achievementKey = document.getElementById('achievement-type').value;
            const achievement = ACHIEVEMENTS[achievementKey];
            const month = document.getElementById('points-month').value;
            const result = await addPoints(employeeId, achievement.name, achievement.points, month);
            if (result.success) { alert(`Начислено ${achievement.points} баллов!`); renderApp(); }
            else alert('Ошибка');
        });

        document.getElementById('add-cash-btn')?.addEventListener('click', async () => {
            const employeeId = document.getElementById('cash-emp').value;
            const amount = parseFloat(document.getElementById('cash-amount').value);
            const month = document.getElementById('cash-month').value;
            const reason = document.getElementById('cash-reason').value || 'Дополнительная премия';
            const result = await addBonus(employeeId, amount, month, reason);
            if (result.success) { alert('Премия назначена!'); renderApp(); }
            else alert('Ошибка');
        });

        document.getElementById('calc-salary-btn')?.addEventListener('click', async () => {
            const month = document.getElementById('salary-month').value;
            const employees = await getEmployees();
            let html = `<div class="table-wrapper"><table><thead><tr><th>Должность</th><th>Ставка</th><th>Баллов</th><th>Премия от баллов</th><th>Ручная премия</th><th>Итого</th></tr></thead><tbody>`;
            for (const emp of employees) {
                const points = getPoints(emp.id, month);
                const pointsBonus = points * POINT_VALUE;
                const manualBonus = getBonuses(emp.id, month);
                const total = Number(emp.baseRate) + pointsBonus + manualBonus;
                html += `<tr><td>${emp.position}</td><td>${Number(emp.baseRate).toLocaleString()} ₽</td><td>${points}</td><td>${pointsBonus.toLocaleString()} ₽</td><td>${manualBonus.toLocaleString()} ₽</td><td><strong>${total.toLocaleString()} ₽</strong></td></tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('salary-result').innerHTML = html;
        });

        document.querySelectorAll('.edit-rate-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const newRate = prompt('Новая базовая ставка (руб)');
                if (newRate && !isNaN(parseFloat(newRate))) {
                    await updateRate(id, parseFloat(newRate));
                    alert('Ставка обновлена!');
                    renderApp();
                }
            });
        });

        document.getElementById('clear-points-btn')?.addEventListener('click', async () => {
            if (confirm('Удалить все баллы?')) { await clearAllPoints(); alert('Все баллы удалены!'); renderApp(); }
        });
        document.getElementById('clear-bonuses-btn')?.addEventListener('click', async () => {
            if (confirm('Удалить все премии?')) { await clearAllBonuses(); alert('Все премии удалены!'); renderApp(); }
        });
        document.getElementById('clear-all-btn')?.addEventListener('click', async () => {
            if (confirm('Удалить всё?')) { await clearAllData(); alert('Все данные удалены!'); renderApp(); }
        });
        document.getElementById('clear-employee-month-btn')?.addEventListener('click', async () => {
            const id = document.getElementById('clear-employee-select').value;
            const month = document.getElementById('clear-month').value;
            if (confirm('Удалить баллы за месяц?')) { await clearPointsByEmployeeAndMonth(id, month); alert('Удалено!'); renderApp(); }
        });
        document.getElementById('clear-employee-all-btn')?.addEventListener('click', async () => {
            const id = document.getElementById('clear-employee-select').value;
            if (confirm('Удалить все баллы сотрудника?')) { await clearAllPointsByEmployee(id); alert('Удалено!'); renderApp(); }
        });
    }

    // ========== КАБИНЕТ ПОЛЬЗОВАТЕЛЯ ==========

    function renderUserDashboard() {
        const currentMonth = new Date().toISOString().slice(0, 7);
        const points = getPoints(currentUser.id, currentMonth);
        const pointsBonus = points * POINT_VALUE;
        const manualBonus = getBonuses(currentUser.id, currentMonth);
        const totalSalary = Number(currentUser.baseRate) + pointsBonus + manualBonus;

        return `
            <div class="container">
                <div class="card">
                    <div class="user-header">
                        <h1>🎓 ГГУ - Личный кабинет</h1>
                        <button id="logout-user" class="btn-secondary">Выйти</button>
                    </div>
                    <p><strong>${currentUser.position}</strong> | Базовая ставка: ${Number(currentUser.baseRate).toLocaleString()} ₽</p>
                </div>
                <div class="grid-2col">
                    <div class="card">
                        <h3>⭐ Мои баллы за ${currentMonth}</h3>
                        <p class="salary-big">${points} баллов</p>
                        <p>Премия от баллов: ${pointsBonus.toLocaleString()} ₽</p>
                    </div>
                    <div class="card">
                        <h3>💰 Итого за ${currentMonth}</h3>
                        <p class="salary-big">${totalSalary.toLocaleString()} ₽</p>
                        <p>Базовая ставка: ${Number(currentUser.baseRate).toLocaleString()} ₽</p>
                        <p>Премия от баллов: +${pointsBonus.toLocaleString()} ₽</p>
                        <p>Доп. премия: +${manualBonus.toLocaleString()} ₽</p>
                    </div>
                </div>
            </div>
        `;
    }

    function attachUserEvents() {
        document.getElementById('logout-user')?.addEventListener('click', () => {
            currentUser = null;
            clearCurrentUser();
            renderApp();
        });
    }

    // ========== ЗАПУСК ==========

    (async function() {
        await checkServer();
        renderApp();
    })();
</script>
</body>
</html>
