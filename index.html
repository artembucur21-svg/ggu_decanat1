<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГГУ - Система деканата</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app"></div>

<script>
    // =====================================================
    // РАБОТА С БАЗОЙ ДАННЫХ ЧЕРЕЗ API
    // =====================================================
    const API_URL = 'http://localhost/ggu_decanat/api.php';

    // Текущий пользователь
    let currentUser = null;

    // Стоимость балла
    const POINT_VALUE = 500;

    // Типы достижений
    const ACHIEVEMENTS = {
        candidate_defense: { name: 'Защита кандидатской диссертации', points: 10 },
        doctoral_defense: { name: 'Защита докторской диссертации', points: 25 },
        article_scopus: { name: 'Публикация в Scopus/WoS', points: 8 },
        article_vak: { name: 'Публикация в ВАК', points: 5 },
        conference: { name: 'Участие в конференции', points: 2 },
        textbook: { name: 'Издание учебника', points: 12 }
    };

    // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С API ==========

    // Получить всех сотрудников
    async function getEmployees() {
        const response = await fetch(`${API_URL}?action=get_employees`);
        return await response.json();
    }

    // Авторизация
    async function loginUser(login, password) {
        const response = await fetch(`${API_URL}?action=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`);
        return await response.json();
    }

    // Получить баллы сотрудника за месяц
    async function getPoints(employeeId, month) {
        const response = await fetch(`${API_URL}?action=get_points&employeeId=${employeeId}&month=${month}`);
        const data = await response.json();
        return data.points || 0;
    }

    // Получить премии сотрудника за месяц
    async function getBonuses(employeeId, month) {
        const response = await fetch(`${API_URL}?action=get_bonuses&employeeId=${employeeId}&month=${month}`);
        const data = await response.json();
        return data.bonus || 0;
    }

    // Начислить баллы
    async function addPoints(employeeId, achievementName, points, month) {
        const response = await fetch(`${API_URL}?action=add_points`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeId, achievementName, points, month })
        });
        return await response.json();
    }

    // Назначить премию
    async function addBonus(employeeId, amount, month, reason) {
        const response = await fetch(`${API_URL}?action=add_bonus`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeId, amount, month, reason })
        });
        return await response.json();
    }

    // Обновить ставку
    async function updateRate(employeeId, newRate) {
        const response = await fetch(`${API_URL}?action=update_rate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeId, newRate })
        });
        return await response.json();
    }

    // ========== ФУНКЦИИ ДЛЯ ОЧИСТКИ ДАННЫХ ==========

    // Очистить все баллы (всех сотрудников)
    async function clearAllPoints() {
        const response = await fetch(`${API_URL}?action=clear_points`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        return await response.json();
    }

    // Очистить все премии (всех сотрудников)
    async function clearAllBonuses() {
        const response = await fetch(`${API_URL}?action=clear_bonuses`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        return await response.json();
    }

    // Очистить всё (баллы и премии всех сотрудников)
    async function clearAllData() {
        const response = await fetch(`${API_URL}?action=clear_all`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        return await response.json();
    }

    // Очистить баллы конкретного сотрудника за конкретный месяц
    async function clearPointsByEmployeeAndMonth(employeeId, month) {
        const response = await fetch(`${API_URL}?action=clear_points_by_employee_month`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeId, month })
        });
        return await response.json();
    }

    // Очистить ВСЕ баллы конкретного сотрудника (за все месяцы)
    async function clearAllPointsByEmployee(employeeId) {
        const response = await fetch(`${API_URL}?action=clear_all_points_by_employee`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeId })
        });
        return await response.json();
    }

    // ========== ОТРИСОВКА ИНТЕРФЕЙСА ==========

    async function renderApp() {
        const appDiv = document.getElementById('app');
        
        if (!currentUser) {
            appDiv.innerHTML = renderLoginScreen();
            document.getElementById('login-form')?.addEventListener('submit', handleLogin);
            return;
        }
        
        if (currentUser.position === 'Администратор системы') {
            appDiv.innerHTML = await renderAdminDashboard();
            attachAdminEvents();
        } else {
            appDiv.innerHTML = await renderUserDashboard();
            attachUserEvents();
        }
    }

    function renderLoginScreen() {
        return `
            <div class="auth-overlay">
                <div class="auth-card">
                    <h2 style="text-align:center;">📚 ГГУ - Деканат</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label>Логин</label>
                            <input type="text" id="login-username" placeholder="Логин" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="login-password" placeholder="Пароль" autocomplete="off">
                        </div>
                        <button type="submit" style="width:100%">Войти</button>
                    </form>
                </div>
            </div>
        `;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const login = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        
        const result = await loginUser(login, password);
        
        if (result.success) {
            currentUser = result.user;
            renderApp();
        } else {
            alert('Неверный логин или пароль');
        }
    }

    async function renderAdminDashboard() {
        const employees = await getEmployees();
        const currentMonth = new Date().toISOString().slice(0,7);
        
        return `
            <div class="container">
                <div class="card">
                    <div class="user-header">
                        <h1>🎓 ГГУ - Панель деканата</h1>
                        <button id="logout-btn" class="btn-secondary">Выйти</button>
                    </div>
                    <p>👋 Вы вошли как <strong>${currentUser.position}</strong></p>
                    <p>⭐ Стоимость 1 балла: <strong>${POINT_VALUE} ₽</strong></p>
                </div>

                <div class="card">
                    <h2>👥 Штат сотрудников (${employees.length} чел.)</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr><th>Должность</th><th>Базовая ставка</th><th>Баллов за месяц</th><th>Премия от баллов</th><th>Действия</th></tr>
                            </thead>
                            <tbody id="employees-table-body">
                                ${await renderEmployeesTable(employees, currentMonth)}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="grid-2col">
                    <div class="card">
                        <h3>📝 Начислить баллы</h3>
                        <div class="form-group">
                            <label>Сотрудник</label>
                            <select id="points-emp">${employees.map(emp => `<option value="${emp.id}">${emp.position}</option>`).join('')}</select>
                        </div>
                        <div class="form-group">
                            <label>Тип достижения</label>
                            <select id="achievement-type">
                                ${Object.entries(ACHIEVEMENTS).map(([key, val]) => `<option value="${key}" data-points="${val.points}">${val.name} (${val.points} баллов)</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group"><label>Месяц</label><input type="month" id="points-month" value="${currentMonth}"></div>
                        <button id="add-points-btn">➕ Начислить баллы</button>
                    </div>
                    <div class="card">
                        <h3>💰 Назначить премию</h3>
                        <div class="form-group"><label>Сотрудник</label><select id="cash-emp">${employees.map(emp => `<option value="${emp.id}">${emp.position}</option>`).join('')}</select></div>
                        <div class="form-group"><label>Сумма премии (₽)</label><input type="number" id="cash-amount" step="1000" value="5000"></div>
                        <div class="form-group"><label>Месяц</label><input type="month" id="cash-month" value="${currentMonth}"></div>
                        <div class="form-group"><label>Основание</label><input type="text" id="cash-reason" placeholder="Например: работа в приёмной комиссии"></div>
                        <button id="add-cash-btn">✨ Назначить премию</button>
                    </div>
                </div>

                <div class="card">
                    <h2>💰 Расчёт зарплаты за месяц</h2>
                    <div class="form-group"><label>Выберите месяц</label><input type="month" id="salary-month" value="${currentMonth}"></div>
                    <button id="calc-salary-btn">Рассчитать зарплату</button>
                    <div id="salary-result" style="margin-top: 1rem;"></div>
                </div>

                <!-- КАРТОЧКА ОЧИСТКИ ВСЕХ ДАННЫХ -->
                <div class="card">
                    <h2>🧹 Очистка данных</h2>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <button id="clear-points-btn" style="background: #dc2626;">🗑️ Очистить все баллы</button>
                        <button id="clear-bonuses-btn" style="background: #dc2626;">🗑️ Очистить все премии</button>
                        <button id="clear-all-btn" style="background: #b91c1c;">⚠️ Очистить всё (баллы + премии)</button>
                    </div>
                    <p style="margin-top: 0.75rem; color: #7a6a5c; font-size: 0.8rem;">
                        ⚠️ Внимание! Данные будут удалены без возможности восстановления.
                    </p>
                </div>

                <!-- КАРТОЧКА ОЧИСТКИ БАЛЛОВ У КОНКРЕТНОГО СОТРУДНИКА -->
                <div class="card">
                    <h2>🎯 Очистка баллов у конкретного сотрудника</h2>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                        <div class="form-group" style="flex: 2;">
                            <label>Выберите сотрудника</label>
                            <select id="clear-employee-select">
                                ${employees.map(emp => `<option value="${emp.id}">${emp.position}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Месяц</label>
                            <input type="month" id="clear-month" value="${currentMonth}">
                        </div>
                        <button id="clear-employee-month-btn" style="background: #f97316;">🗑️ Очистить баллы за месяц</button>
                        <button id="clear-employee-all-btn" style="background: #dc2626;">⚠️ Очистить ВСЕ баллы сотрудника</button>
                    </div>
                    <p style="margin-top: 0.75rem; color: #7a6a5c; font-size: 0.8rem;">
                        ⚠️ Удаляет баллы только у выбранного сотрудника. Премии не затрагиваются.
                    </p>
                </div>
            </div>
        `;
    }

    async function renderEmployeesTable(employees, month) {
        let html = '';
        for (const emp of employees) {
            if (emp.position === 'Администратор системы') continue;
            const points = await getPoints(emp.id, month);
            const pointsBonus = points * POINT_VALUE;
            html += `
                <tr>
                    <td>${emp.position}</td>
                    <td>${Number(emp.baseRate).toLocaleString()} ₽</td>
                    <td><span class="points-badge">${points} баллов</span></td>
                    <td>${pointsBonus.toLocaleString()} ₽</td>
                    <td><button class="edit-rate-btn" data-id="${emp.id}">✏️ Изменить ставку</button></td>
                </tr>
            `;
        }
        return html;
    }

    async function renderUserDashboard() {
        const currentMonth = new Date().toISOString().slice(0,7);
        const points = await getPoints(currentUser.id, currentMonth);
        const pointsBonus = points * POINT_VALUE;
        const manualBonus = await getBonuses(currentUser.id, currentMonth);
        const totalSalary = Number(currentUser.baseRate) + pointsBonus + manualBonus;
        
        return `
            <div class="container">
                <div class="card">
                    <div class="user-header">
                        <h1>🎓 ГГУ - Личный кабинет</h1>
                        <button id="logout-user" class="btn-secondary">Выйти</button>
                    </div>
                    <p><strong>${currentUser.position}</strong> | Базовая ставка: ${Number(currentUser.baseRate).toLocaleString()} ₽</p>
                </div>
                <div class="grid-2col">
                    <div class="card">
                        <h3>⭐ Мои баллы за ${currentMonth}</h3>
                        <p class="salary-big">${points} баллов</p>
                        <p>Стоимость 1 балла: ${POINT_VALUE} ₽</p>
                        <p>Премия от баллов: ${pointsBonus.toLocaleString()} ₽</p>
                    </div>
                    <div class="card">
                        <h3>💰 Итого за ${currentMonth}</h3>
                        <p class="salary-big">${totalSalary.toLocaleString()} ₽</p>
                        <p>Базовая ставка: ${Number(currentUser.baseRate).toLocaleString()} ₽</p>
                        <p>Премия от баллов: +${pointsBonus.toLocaleString()} ₽</p>
                        <p>Доп. премия: +${manualBonus.toLocaleString()} ₽</p>
                    </div>
                </div>
            </div>
        `;
    }

    function attachAdminEvents() {
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            currentUser = null;
            renderApp();
        });
        
        // Начисление баллов
        document.getElementById('add-points-btn')?.addEventListener('click', async () => {
            const employeeId = document.getElementById('points-emp').value;
            const achievementKey = document.getElementById('achievement-type').value;
            const achievement = ACHIEVEMENTS[achievementKey];
            const month = document.getElementById('points-month').value;
            
            const result = await addPoints(employeeId, achievement.name, achievement.points, month);
            if (result.success) {
                alert('Баллы начислены!');
                renderApp();
            } else {
                alert('Ошибка: ' + result.error);
            }
        });
        
        // Назначение премии
        document.getElementById('add-cash-btn')?.addEventListener('click', async () => {
            const employeeId = document.getElementById('cash-emp').value;
            const amount = parseFloat(document.getElementById('cash-amount').value);
            const month = document.getElementById('cash-month').value;
            const reason = document.getElementById('cash-reason').value || 'Дополнительная премия';
            
            const result = await addBonus(employeeId, amount, month, reason);
            if (result.success) {
                alert('Премия назначена!');
                renderApp();
            } else {
                alert('Ошибка: ' + result.error);
            }
        });
        
        // Расчёт зарплаты
        document.getElementById('calc-salary-btn')?.addEventListener('click', async () => {
            const month = document.getElementById('salary-month').value;
            const employees = await getEmployees();
            let html = `<div class="table-wrapper"><table><thead><tr><th>Должность</th><th>Базовая ставка</th><th>Баллов</th><th>Премия от баллов</th><th>Ручная премия</th><th>Итого</th></tr></thead><tbody>`;
            
            for (const emp of employees) {
                if (emp.position === 'Администратор системы') continue;
                const points = await getPoints(emp.id, month);
                const pointsBonus = points * POINT_VALUE;
                const manualBonus = await getBonuses(emp.id, month);
                const total = Number(emp.baseRate) + pointsBonus + manualBonus;
                html += `<tr>
                    <td>${emp.position}</td>
                    <td>${Number(emp.baseRate).toLocaleString()} ₽</td>
                    <td>${points}</td>
                    <td>${pointsBonus.toLocaleString()} ₽</td>
                    <td>${manualBonus.toLocaleString()} ₽</td>
                    <td><strong>${total.toLocaleString()} ₽</strong></td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('salary-result').innerHTML = html;
        });
        
        // Редактирование ставки
        document.querySelectorAll('.edit-rate-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                const newRate = prompt('Новая базовая ставка (руб)');
                if (newRate && !isNaN(parseFloat(newRate))) {
                    await updateRate(id, parseFloat(newRate));
                    alert('Ставка обновлена!');
                    renderApp();
                }
            });
        });

        // ========== ОБРАБОТЧИКИ ОЧИСТКИ ==========

        // Очистить все баллы
        document.getElementById('clear-points-btn')?.addEventListener('click', async () => {
            if (confirm('Вы уверены, что хотите удалить ВСЕ записи о баллах? Это действие необратимо.')) {
                const result = await clearAllPoints();
                if (result.success) {
                    alert('Все баллы удалены!');
                    renderApp();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        });
        
        // Очистить все премии
        document.getElementById('clear-bonuses-btn')?.addEventListener('click', async () => {
            if (confirm('Вы уверены, что хотите удалить ВСЕ записи о премиях? Это действие необратимо.')) {
                const result = await clearAllBonuses();
                if (result.success) {
                    alert('Все премии удалены!');
                    renderApp();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        });
        
        // Очистить всё
        document.getElementById('clear-all-btn')?.addEventListener('click', async () => {
            if (confirm('ВНИМАНИЕ! Вы уверены, что хотите удалить ВСЕ баллы и ВСЕ премии? Это действие необратимо.')) {
                const result = await clearAllData();
                if (result.success) {
                    alert('Все данные (баллы и премии) удалены!');
                    renderApp();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        });

        // Очистить баллы у конкретного сотрудника за конкретный месяц
        document.getElementById('clear-employee-month-btn')?.addEventListener('click', async () => {
            const employeeId = document.getElementById('clear-employee-select').value;
            const month = document.getElementById('clear-month').value;
            const employeeName = document.querySelector('#clear-employee-select option:checked')?.textContent || 'сотрудника';
            
            if (confirm(`Вы уверены, что хотите удалить ВСЕ баллы у ${employeeName} за месяц ${month}? Это действие необратимо.`)) {
                const result = await clearPointsByEmployeeAndMonth(employeeId, month);
                if (result.success) {
                    alert(`Баллы у ${employeeName} за ${month} удалены!`);
                    renderApp();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        });
        
        // Очистить ВСЕ баллы у конкретного сотрудника (за все месяцы)
        document.getElementById('clear-employee-all-btn')?.addEventListener('click', async () => {
            const employeeId = document.getElementById('clear-employee-select').value;
            const employeeName = document.querySelector('#clear-employee-select option:checked')?.textContent || 'сотрудника';
            
            if (confirm(`ВНИМАНИЕ! Вы уверены, что хотите удалить ВСЕ баллы у ${employeeName} за ВСЕ месяцы? Это действие необратимо.`)) {
                const result = await clearAllPointsByEmployee(employeeId);
                if (result.success) {
                    alert(`Все баллы у ${employeeName} удалены!`);
                    renderApp();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            }
        });
    }

    function attachUserEvents() {
        document.getElementById('logout-user')?.addEventListener('click', () => {
            currentUser = null;
            renderApp();
        });
    }

    // Запуск приложения
    renderApp();
</script>
</body>
</html>
